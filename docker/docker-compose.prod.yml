version: '3.8'

# Production docker-compose configuration
# Usage: docker compose -f docker/docker-compose.prod.yml up -d

services:
  web:
    image: wrapp0r/web:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      cache_from:
        - wrapp0r/web:latest
    ports:
      - "${WEB_PORT:-80}:80"
      - "${WEB_HTTPS_PORT:-443}:443"
    depends_on:
      server:
        condition: service_healthy
    restart: always
    networks:
      - wrapp0r-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  server:
    image: wrapp0r/server:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
      cache_from:
        - wrapp0r/server:latest
    ports:
      - "${SERVER_PORT:-3001}:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - CORS_ORIGIN=${CORS_ORIGIN:-https://your-domain.com}
    restart: always
    networks:
      - wrapp0r-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  wrapp0r-network:
    driver: bridge
