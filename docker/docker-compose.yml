version: '3.8'

services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - wrapp0r-network

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    ports:
      - "${SERVER_PORT:-3001}:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    restart: unless-stopped
    networks:
      - wrapp0r-network

networks:
  wrapp0r-network:
    driver: bridge
