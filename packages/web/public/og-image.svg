<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#16213E"/>
    </linearGradient>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1DB954"/>
      <stop offset="100%" style="stop-color:#00D4FF"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="150" fill="#1DB954" opacity="0.1"/>
  <circle cx="1100" cy="530" r="200" fill="#00D4FF" opacity="0.1"/>
  <circle cx="600" cy="315" r="100" fill="#FF2D6A" opacity="0.05"/>

  <!-- Logo container -->
  <g transform="translate(600, 240)">
    <!-- Glow effect -->
    <rect x="-70" y="-70" width="140" height="140" rx="28" fill="url(#logoGradient)" filter="url(#glow)" opacity="0.6"/>
    <!-- Main logo -->
    <rect x="-70" y="-70" width="140" height="140" rx="28" fill="url(#logoGradient)"/>
    <text x="0" y="35" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="90" font-weight="bold" fill="white" text-anchor="middle">W</text>
  </g>

  <!-- Brand name -->
  <text x="600" y="420" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="56" font-weight="bold" fill="white" text-anchor="middle">
    <tspan>Wrapp</tspan><tspan fill="#1DB954">0</tspan><tspan>r</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="475" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="28" fill="rgba(255,255,255,0.7)" text-anchor="middle">Your Data, Wrapped</text>

  <!-- Corner accents -->
  <path d="M20 70 L20 20 L70 20" stroke="rgba(255,255,255,0.1)" stroke-width="2" fill="none"/>
  <path d="M1130 20 L1180 20 L1180 70" stroke="rgba(255,255,255,0.1)" stroke-width="2" fill="none"/>
  <path d="M20 560 L20 610 L70 610" stroke="rgba(255,255,255,0.1)" stroke-width="2" fill="none"/>
  <path d="M1130 610 L1180 610 L1180 560" stroke="rgba(255,255,255,0.1)" stroke-width="2" fill="none"/>
</svg>
